<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowOS — Personal Productivity System</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%236E6BFF%22/></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/habits.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/kanban.css">
<link rel="stylesheet" href="css/notes.css">
<link rel="stylesheet" href="css/goals.css">
<link rel="stylesheet" href="css/achievements.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="aurora-bg" aria-hidden="true">
  <div class="aurora-blob aurora-blob--1"></div>
  <div class="aurora-blob aurora-blob--2"></div>
  <div class="aurora-blob aurora-blob--3"></div>
</div>

<div class="app-shell" id="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 32 32" width="22" height="22"><circle cx="16" cy="16" r="14" fill="none" stroke="url(#g)" stroke-width="3"/><circle cx="16" cy="16" r="5" fill="url(#g)"/><defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop offset="0" stop-color="#7C7AFF"/><stop offset="1" stop-color="#57D9C4"/></linearGradient></defs></svg>
      </div>
      <span class="brand-name">FlowOS</span>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item is-active" data-route="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-route="habits">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
        <span>Habits</span>
      </button>
      <button class="nav-item" data-route="calendar">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        <span>Calendar</span>
      </button>
      <button class="nav-item" data-route="projects">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M9 4v17M15 4v17"/></svg>
        <span>Projects</span>
      </button>
      <button class="nav-item" data-route="goals">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
        <span>Goals</span>
      </button>
      <button class="nav-item" data-route="notes">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M6 3h9l4 4v14a1 1 0 01-1 1H6a1 1 0 01-1-1V4a1 1 0 011-1z"/><path d="M9 9h6M9 13h6M9 17h3"/></svg>
        <span>Notes</span>
      </button>
      <button class="nav-item" data-route="stats">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
        <span>Analytics</span>
      </button>
      <button class="nav-item" data-route="achievements">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M9 13l-2 8 5-3 5 3-2-8"/></svg>
        <span>Achievements</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="level-chip" id="sidebar-level">
        <div class="level-ring" id="sidebar-level-ring">
          <svg viewBox="0 0 40 40"><circle class="ring-track" cx="20" cy="20" r="17"/><circle class="ring-fill" id="sidebar-ring-fill" cx="20" cy="20" r="17"/></svg>
          <span id="sidebar-level-num">1</span>
        </div>
        <div class="level-text">
          <span class="level-label">Level <b id="sidebar-level-label">1</b></span>
          <span class="level-xp" id="sidebar-xp-label">0 / 100 XP</span>
        </div>
      </div>
      <button class="nav-item nav-item--ghost" data-route="settings">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="sidebar-toggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <h1 class="page-title" id="page-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box" id="search-box-trigger">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="global-search" placeholder="Search everything…" readonly />
          <span class="kbd-hint">⌘K</span>
        </div>
        <div id="theme-switch-slot"></div>
        <div class="notif-btn-wrap">
          <button class="icon-btn" id="notif-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notif-dot" id="notif-dot" style="display:none;"></span>
          </button>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-dropdown-header"><span>Notifications</span></div>
            <div id="notif-list"></div>
          </div>
        </div>
        <button class="icon-btn" id="quick-add-btn" aria-label="Quick add">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <div class="date-chip" id="topbar-date">—</div>
      </div>
    </header>

    <div class="view-container" id="view-container">
      <!-- Views injected here by ui.js -->
    </div>
  </main>
</div>

<!-- Modal root -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-panel" id="modal-panel"></div>
</div>

<!-- Toast root -->
<div class="toast-stack" id="toast-stack"></div>

<!-- Command palette / quick add -->
<div class="palette-overlay" id="palette-overlay">
  <div class="palette-panel" id="palette-panel"></div>
</div>

<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/state.js"></script>
<script src="js/theme.js"></script>
<script src="js/charts.js"></script>
<script src="js/ui.js"></script>
<script src="js/habits.js"></script>
<script src="js/calendar.js"></script>
<script src="js/projects.js"></script>
<script src="js/goals.js"></script>
<script src="js/notes.js"></script>
<script src="js/stats.js"></script>
<script src="js/achievements.js"></script>
<script src="js/app.js"></script>
</body>
</html>
